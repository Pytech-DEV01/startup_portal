<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startup Portal - Event Management</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .content {
      padding: 30px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
    }

    .tab-button {
      padding: 12px 24px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 1em;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      color: #666;
    }

    .tab-button.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-button:hover {
      color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1em;
      font-family: inherit;
      transition: border-color 0.3s ease;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .message {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .event-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      background: #f9f9f9;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .event-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .event-card h3 {
      color: #667eea;
      margin-bottom: 10px;
    }

    .event-card p {
      color: #666;
      margin-bottom: 8px;
      font-size: 0.95em;
    }

    .event-card .badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.85em;
      margin-bottom: 10px;
    }

    .event-card .actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .event-card button {
      flex: 1;
      padding: 8px;
      font-size: 0.9em;
    }

    .btn-edit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .btn-delete {
      background: #dc3545;
    }

    .btn-delete:hover {
      background: #c82333;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .events-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 1.8em;
      }
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .modal-content h2 {
      color: #667eea;
      margin-bottom: 20px;
    }

    .close-modal {
      background: #6c757d;
      margin-top: 20px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 Startup Portal</h1>
      <p>Event Management System</p>
    </div>

    <div class="content">
      <div id="message" class="message"></div>

      <div class="tabs">
        <button class="tab-button active" data-tab="view-events">View Events</button>
        <button class="tab-button" data-tab="create-event">Create Event</button>
      </div>

      <!-- View Events Tab -->
      <div id="view-events" class="tab-content active">
        <h2>📋 All Events</h2>
        <div id="events-list" class="events-grid"></div>
      </div>

      <!-- Create Event Tab -->
      <div id="create-event" class="tab-content">
        <h2>➕ Create New Event</h2>
        <form id="event-form">
          <div class="form-row">
            <div class="form-group">
              <label for="title">Event Title *</label>
              <input type="text" id="title" name="title" required>
            </div>
            <div class="form-group">
              <label for="event_type">Event Type *</label>
              <select id="event_type" name="event_type" required>
                <option value="">Select Type</option>
                <option value="Hackathon">Hackathon</option>
                <option value="Workshop">Workshop</option>
                <option value="Conference">Conference</option>
                <option value="Networking">Networking</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea>
          </div>

          <div class="form-group">
            <label for="venue">Venue *</label>
            <input type="text" id="venue" name="venue" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="start_date">Start Date *</label>
              <input type="datetime-local" id="start_date" name="start_date" required>
            </div>
            <div class="form-group">
              <label for="end_date">End Date *</label>
              <input type="datetime-local" id="end_date" name="end_date" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="max_participants">Max Participants</label>
              <input type="number" id="max_participants" name="max_participants" min="1">
            </div>
            <div class="form-group">
              <label for="prize_pool">Prize Pool ($)</label>
              <input type="number" id="prize_pool" name="prize_pool" min="0" step="0.01">
            </div>
          </div>

          <button type="submit">Create Event</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h2>Edit Event</h2>
      <form id="edit-form">
        <input type="hidden" id="edit-event-id">
        <div class="form-group">
          <label for="edit-title">Event Title</label>
          <input type="text" id="edit-title" required>
        </div>
        <div class="form-group">
          <label for="edit-status">Status</label>
          <select id="edit-status">
            <option value="upcoming">Upcoming</option>
            <option value="ongoing">Ongoing</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="form-group">
          <label for="edit-description">Description</label>
          <textarea id="edit-description"></textarea>
        </div>
        <button type="submit">Update Event</button>
        <button type="button" class="close-modal" onclick="closeEditModal()">Cancel</button>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000/api';

    // Tab switching
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => {
        const tabName = button.dataset.tab;
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        button.classList.add('active');

        if (tabName === 'view-events') {
          loadEvents();
        }
      });
    });

    // Load events
    async function loadEvents() {
      try {
        const response = await fetch(`${API_BASE}/events`);
        const events = await response.json();

        const eventsList = document.getElementById('events-list');
        eventsList.innerHTML = '';

        if (events.length === 0) {
          eventsList.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">No events yet. Create one to get started!</p>';
          return;
        }

        events.forEach(event => {
          const card = document.createElement('div');
          card.className = 'event-card';
          card.innerHTML = `
            <span class="badge">${event.event_type}</span>
            <h3>${event.title}</h3>
            <p><strong>Status:</strong> ${event.status}</p>
            <p><strong>Venue:</strong> ${event.venue}</p>
            <p><strong>Start:</strong> ${new Date(event.start_date).toLocaleString()}</p>
            <p><strong>End:</strong> ${new Date(event.end_date).toLocaleString()}</p>
            ${event.max_participants ? `<p><strong>Max Participants:</strong> ${event.max_participants}</p>` : ''}
            ${event.prize_pool ? `<p><strong>Prize Pool:</strong> $${event.prize_pool}</p>` : ''}
            ${event.description ? `<p><strong>Description:</strong> ${event.description}</p>` : ''}
            <div class="actions">
              <button class="btn-edit" onclick="openEditModal(${event.event_id})">Edit</button>
              <button class="btn-delete" onclick="deleteEvent(${event.event_id})">Delete</button>
            </div>
          `;
          eventsList.appendChild(card);
        });
      } catch (error) {
        showMessage('Error loading events: ' + error.message, 'error');
      }
    }

    // Create event
    document.getElementById('event-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = {
        title: document.getElementById('title').value,
        event_type: document.getElementById('event_type').value,
        description: document.getElementById('description').value,
        venue: document.getElementById('venue').value,
        start_date: document.getElementById('start_date').value,
        end_date: document.getElementById('end_date').value,
        max_participants: parseInt(document.getElementById('max_participants').value) || 0,
        prize_pool: parseFloat(document.getElementById('prize_pool').value) || 0
      };

      try {
        const response = await fetch(`${API_BASE}/events`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          showMessage('Event created successfully!', 'success');
          document.getElementById('event-form').reset();
          setTimeout(() => {
            document.querySelector('[data-tab="view-events"]').click();
          }, 1000);
        } else {
          showMessage('Error creating event', 'error');
        }
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    });

    // Edit modal functions
    function openEditModal(eventId) {
      fetch(`${API_BASE}/events/${eventId}`)
        .then(r => r.json())
        .then(event => {
          document.getElementById('edit-event-id').value = event.event_id;
          document.getElementById('edit-title').value = event.title;
          document.getElementById('edit-status').value = event.status;
          document.getElementById('edit-description').value = event.description;
          document.getElementById('editModal').classList.add('active');
        });
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
    }

    document.getElementById('edit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const eventId = document.getElementById('edit-event-id').value;

      const formData = {
        title: document.getElementById('edit-title').value,
        status: document.getElementById('edit-status').value,
        description: document.getElementById('edit-description').value,
        venue: '',
        start_date: '',
        end_date: '',
        max_participants: 0,
        prize_pool: 0
      };

      try {
        const response = await fetch(`${API_BASE}/events/${eventId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          showMessage('Event updated successfully!', 'success');
          closeEditModal();
          loadEvents();
        }
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    });

    // Delete event
    async function deleteEvent(eventId) {
      if (!confirm('Are you sure you want to delete this event?')) return;

      try {
        const response = await fetch(`${API_BASE}/events/${eventId}`, { method: 'DELETE' });
        if (response.ok) {
          showMessage('Event deleted successfully!', 'success');
          loadEvents();
        }
      } catch (error) {
        showMessage('Error: ' + error.message, 'error');
      }
    }

    // Show message
    function showMessage(text, type) {
      const messageEl = document.getElementById('message');
      messageEl.textContent = text;
      messageEl.className = `message ${type}`;
      setTimeout(() => {
        messageEl.className = 'message';
      }, 4000);
    }

    // Load events on page load
    loadEvents();
  </script>
</body>
</html>
